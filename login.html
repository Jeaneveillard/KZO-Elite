<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src https://api.emailjs.com;">
    <title>KZO InspectPro — Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="login.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
            text-align: center;
        }
        .login-logo {
            font-size: 1.15rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .login-subtitle {
            color: #94a3b8;
            font-size: 0.78rem;
            margin-bottom: 24px;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #1A56DB; }
        .btn-primary {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #1A56DB, #0d9488);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 14px;
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: #dc2626;
            font-size: 0.8rem;
            margin-bottom: 8px;
            min-height: 18px;
        }
        .success-msg {
            color: #16a34a;
            font-size: 0.8rem;
            margin-bottom: 8px;
            min-height: 18px;
        }
        .forgot-link {
            color: #1A56DB;
            font-size: 0.8rem;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: underline;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 18px 0;
        }
        .panel-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 10px;
        }
        .panel-desc {
            font-size: 0.78rem;
            color: #64748b;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">🏠 KZO InspectPro</div>
    <div class="login-subtitle">Accès sécurisé</div>

    <!-- Panneau 1 : Connexion -->
    <div id="panelLogin" class="panel active">
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
        <div class="error-msg" id="loginError"></div>
        <button type="button" class="btn-primary" id="loginBtn">Entrer</button>
        <button type="button" class="forgot-link">🔑 Mot de passe oublié ?</button>
    </div>

    <!-- Panneau 2 : Envoi du code -->
    <div id="panelForgot" class="panel">
        <hr class="divider">
        <div class="panel-title">Récupération du mot de passe</div>
        <div class="panel-desc">Un code à 6 chiffres sera envoyé à<br><strong>kzoinspectpro@gmail.com</strong></div>
        <div class="error-msg" id="forgotError"></div>
        <button type="button" class="btn-primary" id="sendCodeBtn">📧 Envoyer le code</button>
        <button type="button" class="forgot-link" data-back="true">← Retour</button>
    </div>

    <!-- Panneau 3 : Vérification du code -->
    <div id="panelCode" class="panel">
        <hr class="divider">
        <div class="panel-title">Entrez le code reçu</div>
        <div class="panel-desc">Vérifiez votre email — valide 15 minutes</div>
        <input type="text" id="resetCode" placeholder="123456" maxlength="6" inputmode="numeric" />
        <div class="error-msg" id="codeError"></div>
        <button type="button" class="btn-primary">Vérifier</button>
        <button type="button" class="forgot-link" data-back="true">← Retour</button>
    </div>

    <!-- Panneau 4 : Nouveau mot de passe -->
    <div id="panelNewPwd" class="panel">
        <hr class="divider">
        <div class="panel-title">Nouveau mot de passe</div>
        <input type="password" id="newPassword" placeholder="Nouveau mot de passe" />
        <input type="password" id="confirmPassword" placeholder="Confirmer" />
        <div class="error-msg" id="newPwdError"></div>
        <div class="success-msg" id="newPwdSuccess"></div>
        <button type="button" class="btn-primary">✅ Enregistrer</button>
    </div>
</div>

</body>
</html>
