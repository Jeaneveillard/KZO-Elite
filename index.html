<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src https://generativelanguage.googleapis.com https://api.openai.com https://api.anthropic.com https://api.groq.com https://oauth2.googleapis.com https://www.googleapis.com https://accounts.google.com https://script.google.com https://api.emailjs.com; frame-src https://accounts.google.com;">
    <title>KZO InspectPro — Projets</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0c1729">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #0c1729; color: #f1f5f9; min-height: 100vh; }

        /* ── Top-bar ─────────────────────────────────── */
        .topbar {
            background: linear-gradient(90deg, #0c1729 0%, #1a2744 100%);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid #1e3a5f;
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-kzo {
            font-weight: 800;
            font-size: 1.1rem;
            color: #60a5fa;
            letter-spacing: 2px;
        }
        .logo-sub {
            font-size: 0.72rem;
            font-weight: 500;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo-dot {
            width: 5px; height: 5px;
            background: #1d4ed8;
            border-radius: 50%;
            margin-right: 2px;
        }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }
        .tb-btn-home {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border: none; border-radius: 8px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.15s;
        }
        .tb-btn-home:hover { transform: translateY(-1px); filter: brightness(1.15); }
        .tb-btn-import { background: #064e3b; color: #6ee7b7; border: 1px solid #065f3655; }
        .tb-btn-new    { background: linear-gradient(135deg, #1d4ed8, #3730a3); color: white; box-shadow: 0 2px 10px rgba(29,78,216,0.35); }
        .tb-btn-deco   { background: transparent; color: #f87171; border: 1px solid #7f1d1d55; padding: 6px 10px; }
        .tb-btn-deco:hover { background: #991b1b; color: white; filter: none; }
        .tb-divider-v  { width: 1px; height: 20px; background: #1e3a5f; }

        /* ── Contenu principal ───────────────────────── */
        .main { padding: 24px; max-width: 1160px; margin: 0 auto; }

        /* ── Barre de recherche + filtres ────────────── */
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .search-bar {
            flex: 1;
            background: #111d2e;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 10px 16px;
            color: #f1f5f9;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .search-bar::placeholder { color: #334155; }
        .search-bar:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }

        .filters { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn {
            padding: 5px 16px;
            border: 1px solid #1e3a5f;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #475569;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .filter-btn:hover { color: #94a3b8; border-color: #334155; }
        .filter-btn.active { background: #1d4ed8; color: white; border-color: #1d4ed8; }

        /* ── Grille de cartes ────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
        }

        /* Carte "Nouvelle inspection" */
        .card-new {
            background: linear-gradient(135deg, #0f2a5c 0%, #1a1a5e 50%, #0c2d4a 100%);
            border: 1px dashed #2563eb55;
            border-radius: 14px;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 170px;
            text-align: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .card-new::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 60% 30%, rgba(37,99,235,0.18) 0%, transparent 70%);
        }
        .card-new:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(37,99,235,0.25); border-color: #2563eb99; }
        .card-new-icon { font-size: 2rem; position: relative; }
        .card-new-label { font-size: 0.9rem; font-weight: 700; color: #93c5fd; position: relative; }
        .card-new-sub { font-size: 0.72rem; color: #3b82f6; position: relative; }

        /* Cartes de projet */
        .card {
            background: #111d2e;
            border-radius: 14px;
            border: 1px solid #1e3a5f;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            position: relative;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.5); border-color: #2563eb44; }
        .card.en_cours { border-top: 3px solid #f59e0b; }
        .card.termine  { border-top: 3px solid #22c55e; }

        /* Strip photo en haut de la carte */
        .card-photo-strip {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            position: relative;
            overflow: hidden;
        }
        .card.en_cours .card-photo-strip { background: linear-gradient(135deg, #1c1007 0%, #291a04 100%); }
        .card.termine  .card-photo-strip { background: linear-gradient(135deg, #052e1a 0%, #063b20 100%); }

        .card-body { padding: 14px 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .badge {
            padding: 3px 9px; border-radius: 12px;
            font-size: 0.68rem; font-weight: 800; letter-spacing: 0.05em;
        }
        .badge.en_cours { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b44; }
        .badge.termine  { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; }
        .card-date { color: #334155; font-size: 0.72rem; }

        .card-client { font-weight: 700; font-size: 0.95rem; color: #e2e8f0; margin-bottom: 2px; }
        .card-code   { color: #3b82f6; font-size: 0.75rem; font-weight: 600; margin-bottom: 2px; }
        .card-address { color: #475569; font-size: 0.78rem; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-bar-bg   { background: #0c1729; border-radius: 4px; height: 4px; margin-bottom: 5px; }
        .progress-bar-fill { height: 4px; border-radius: 4px; transition: width 0.4s; }
        .en_cours .progress-bar-fill { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .termine  .progress-bar-fill { background: linear-gradient(90deg, #22c55e, #16a34a); }
        .progress-label { color: #334155; font-size: 0.7rem; }

        .card-actions {
            display: none;
            position: absolute;
            bottom: 10px;
            right: 10px;
            gap: 5px;
        }
        .card:hover .card-actions { display: flex; }
        .action-btn {
            padding: 4px 10px; border: none; border-radius: 6px;
            font-size: 0.72rem; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .action-btn.open   { background: #1d4ed8; color: white; }
        .action-btn.export { background: #1e3a5f; color: #94a3b8; }
        .action-btn.del    { background: #7f1d1d55; color: #f87171; border: 1px solid #7f1d1d44; }

        /* Empty state */
        .empty-state { text-align: center; padding: 80px 20px; color: #334155; grid-column: 1 / -1; }
        .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #475569; }

        /* Toast */
        #toast-home {
            position: fixed; bottom: 24px; right: 24px;
            background: #065f46; color: white;
            padding: 12px 20px; border-radius: 10px;
            font-weight: 600; font-size: 0.88rem; display: none;
            z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border-left: 3px solid #10b981;
        }
        /* ── Agenda Modal ────────────────────────────── */
        .agenda-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .agenda-content {
            background: #0f172a; width: 95%; max-width: 900px; max-height: 90vh;
            border-radius: 16px; border: 1px solid #1e3a5f; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .agenda-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: #111d2e; border-bottom: 1px solid #1e3a5f;
        }
        .agenda-header h2 { font-size: 1.25rem; color: #f1f5f9; display: flex; align-items: center; gap: 10px; }
        .agenda-close { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
        .agenda-close:hover { color: #f87171; }
        
        .agenda-body {
            display: flex; flex: 1; min-height: 500px; overflow: hidden;
            flex-direction: row;
        }
        @media (max-width: 768px) { .agenda-body { flex-direction: column; overflow-y: auto; } }

        /* Calendar Side */
        .agenda-calendar {
            flex: 2; padding: 20px; border-right: 1px solid #1e3a5f; display: flex; flex-direction: column;
        }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .cal-nav button { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .cal-nav button:hover { background: #334155; }
        .cal-month-title { font-weight: 700; font-size: 1.1rem; color: #60a5fa; text-transform: capitalize; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; flex: 1; }
        .cal-day-header { text-align: center; font-weight: 600; font-size: 0.8rem; color: #94a3b8; padding-bottom: 8px; }
        .cal-cell {
            background: #111d2e; border: 1px solid #1e3a5f; border-radius: 6px; padding: 6px;
            min-height: 80px; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s;
        }
        .cal-cell:hover { border-color: #3b82f6; background: #16243b; }
        .cal-cell.today { border-color: #f59e0b; background: #f59e0b11; }
        .cal-cell.selected { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        .cal-cell.other-month { opacity: 0.4; }
        .cal-date-num { font-weight: 700; font-size: 0.85rem; color: #cbd5e1; align-self: flex-end; }
        .cal-events-dots { display: flex; gap: 3px; flex-wrap: wrap; margin-top: auto; }
        .cal-dot { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; }

        /* Panel Side */
        .agenda-panel {
            flex: 1; padding: 20px; background: #0c1222; display: flex; flex-direction: column;
        }
        .panel-date-title { font-weight: 700; font-size: 1.1rem; color: #f1f5f9; margin-bottom: 16px; border-bottom: 1px solid #1e3a5f; padding-bottom: 10px; }
        .event-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .empty-events { color: #64748b; font-size: 0.9rem; text-align: center; margin-top: 20px; }
        
        .event-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; position: relative; }
        .event-card h4 { color: #60a5fa; font-size: 0.95rem; margin-bottom: 4px; }
        .event-card .time { color: #cbd5e1; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        .event-card .addr { color: #94a3b8; font-size: 0.8rem; margin-bottom: 10px; }
        .event-card .start-btn { width: 100%; background: #10b981; color: white; border: none; padding: 6px 0; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .event-card .start-btn:hover { background: #059669; }
        .event-card .del-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; }

        .add-event-form { background: #111d2e; border-radius: 8px; border: 1px solid #1e3a5f; padding: 12px; }
        .add-event-form h4 { color: #cbd5e1; font-size: 0.9rem; margin-bottom: 10px; }
        .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .form-row input { flex: 1; padding: 6px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #f1f5f9; font-size: 0.85rem; }
        .add-event-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 4px; }
        .add-event-btn:hover { background: #1d4ed8; }

        @media (max-width: 600px) {
            .topbar { padding: 0 14px; }
            .tb-btn-home span { display: none; }
            .main { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-kzo">KZO</span>
        <span class="logo-sub">InspectPro</span>
    </div>
    <div class="topbar-actions">
        <button type="button" id="agendaBtn" class="tb-btn-home" style="background:#0f766e;color:#ccfbf1;border:1px solid #0f766e;" aria-label="Ouvrir l'agenda">
            📅 <span>Agenda</span>
        </button>
        <div class="tb-divider-v"></div>
        <button type="button" id="importBtn" class="tb-btn-home tb-btn-import" aria-label="Importer un fichier .kzo">
            📂 <span>Ouvrir .kzo</span>
        </button>
        <div class="tb-divider-v"></div>
        <button type="button" id="logoutBtn" class="tb-btn-home tb-btn-deco" aria-label="Déconnexion" title="Déconnexion">🔒</button>
    </div>
</div>

<div class="main">
    <div class="search-row">
        <input class="search-bar" type="text" id="searchInput" placeholder="🔍  Rechercher par client, adresse ou code…" aria-label="Rechercher une inspection">
    </div>

    <div class="filters">
        <button type="button" class="filter-btn active" data-filter="all">Tous</button>
        <button type="button" class="filter-btn" data-filter="en_cours">En cours</button>
        <button type="button" class="filter-btn" data-filter="termine">Terminés</button>
    </div>

    <div class="grid" id="projectGrid"></div>
</div>

<div id="toast-home"></div>
<input type="file" id="importInput" accept=".kzo" style="display:none" aria-label="Importer un fichier .kzo">

<!-- Agenda Modal HTML -->
<div id="agendaModal" class="agenda-modal">
    <div class="agenda-content">
        <div class="agenda-header">
            <h2>📅 Calendrier des Inspections</h2>
            <button class="agenda-close" aria-label="Fermer l'agenda">×</button>
        </div>
        <div class="agenda-body">
            <!-- Calendrier -->
            <div class="agenda-calendar">
                <div class="cal-nav">
                    <button id="agendaPrevBtn" aria-label="Mois précédent">◀</button>
                    <div class="cal-month-title" id="calMonthTitle">Mai 2026</div>
                    <button id="agendaNextBtn" aria-label="Mois suivant">▶</button>
                </div>
                <div class="cal-grid">
                    <div class="cal-day-header">Lun</div>
                    <div class="cal-day-header">Mar</div>
                    <div class="cal-day-header">Mer</div>
                    <div class="cal-day-header">Jeu</div>
                    <div class="cal-day-header">Ven</div>
                    <div class="cal-day-header">Sam</div>
                    <div class="cal-day-header">Dim</div>
                    <!-- Cells injected by JS -->
                </div>
            </div>
            
            <!-- Panel latéral (Rendez-vous du jour sélectionné) -->
            <div class="agenda-panel">
                <div class="panel-date-title" id="panelDateTitle">Sélectionnez une date</div>
                
                <div class="event-list" id="eventList">
                    <!-- Events injected by JS -->
                </div>

                <div class="add-event-form" id="addEventForm" style="display:none;">
                    <h4>Ajouter un rendez-vous</h4>
                    <div class="form-row">
                        <input type="time" id="evTime" required>
                    </div>
                    <div class="form-row">
                        <input type="text" id="evClient" placeholder="Nom du client" required>
                    </div>
                    <div class="form-row">
                        <input type="text" id="evAddress" placeholder="Adresse complète" required>
                    </div>
                    <button type="button" id="agendaSaveBtn" class="add-event-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="kzo_auth_check.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="jszip.min.js"></script>
<script src="storage.js"></script>
<script src="config.js"></script>
<script src="google_calendar.js"></script>
<script src="agenda.js"></script>
<script src="index.js" defer></script>
</body>
</html>
